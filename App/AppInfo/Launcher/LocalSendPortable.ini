[Launch]
Name=LocalSendPortable
ProgramExecutable=LocalSend\localsend_app.exe

[FilesMove]
settings\settings.json=%PAL:AppDir%\LocalSend

[FileWrite1]
Type=Replace
File=%PAL:DataDir%\settings\settings.json
Find=%PAL:LastDrive:DoubleBackslash%\\
Replace=%PAL:Drive:DoubleBackslash%\\

[FileWrite2]
Type=Replace
File=%PAL:DataDir%\settings\settings.json
Find=DATADOWNLOAD
Replace=%PAL:DataDir:DoubleBackslash%\\Downloads
